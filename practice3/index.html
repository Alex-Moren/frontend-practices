<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="index, follow">
        <link rel="stylesheet" href="style.css">
        <title>Pokemon Browser</title>
    </head>
    <body>

        <header>
            <h1>Pokemon Browser</h1>
        </header>
        <main>
            <section id="search_section">
                <input type="text" id="pokemon_name" placeholder="Ingrese el nombre del Pokemon">
                <button id="search_button">Search</button>
            </section>
            <section id="result_section">  
                <img id="pokemon_image" src="" alt="">
                <h2 id="pokemon_title"></h2>
                <p id="pokemon_types"></p>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
